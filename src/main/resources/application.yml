spring:
  application:
    name: raileasy
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: 8080

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:RailEasySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForSecurity}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}  # 24 hours

logging:
  level:
    org.hibernate.SQL: info

